version: 2
updates:
  # npm dependencies across the pnpm workspace (root + every package).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch routine dev-dependency bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: development
    labels:
      - dependencies

  # Keep GitHub Actions pinned and current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
